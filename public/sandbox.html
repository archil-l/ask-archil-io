<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>MCP-UI Proxy</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100vh;
        width: 100vw;
      }
      body {
        display: flex;
        flex-direction: column;
      }
      * {
        box-sizing: border-box;
      }
      iframe {
        background-color: transparent;
        border: 0px none transparent;
        padding: 0px;
        overflow: hidden;
        flex-grow: 1;
      }
    </style>
  </head>
  <body>
    <script>
      let innerIframe = null;

      function renderHtmlInIframe(html) {
        if (innerIframe) return;
        innerIframe = document.createElement('iframe');
        innerIframe.style = 'width:100%; height:100%; border:none;';
        document.body.appendChild(innerIframe);

        // contentDocument is immediately available on a newly appended iframe —
        // no need to wait for a load event (which can fire before the listener attaches)
        const doc = innerIframe.contentDocument;
        try {
          doc.open();
          doc.write(html);
          doc.close();
        } catch (e) {
          console.error('[sandbox] Failed to write HTML to inner iframe:', e);
        }
      }

      window.addEventListener('message', function (event) {
        if (event.source === window.parent) {
          const data = event.data;
          if (
            data &&
            data.method === 'ui/notifications/sandbox-resource-ready' &&
            data.params &&
            typeof data.params.html === 'string'
          ) {
            // Host is sending the app HTML — render it in the inner iframe
            renderHtmlInIframe(data.params.html);
          } else if (innerIframe && innerIframe.contentWindow) {
            // Forward all other host messages to the inner iframe
            innerIframe.contentWindow.postMessage(event.data, '*');
          }
        } else if (innerIframe && event.source === innerIframe.contentWindow) {
          // Relay messages from inner iframe back to host
          window.parent.postMessage(event.data, '*');
        }
      });

      // Signal to host that proxy is ready
      window.parent.postMessage(
        { method: 'ui/notifications/sandbox-proxy-ready' },
        '*'
      );
    </script>
  </body>
</html>
